{% extends "base.html" %}
{% block content %}
<section class="head">
  <h1>书库</h1>
</section>
<section class="panel">
  <h2>新建正式作品</h2>
  <form class="form-grid" method="post" action="/books/create">
    <label>书名<input name="title" required></label>
    <label>核心卖点<textarea name="premise" rows="3"></textarea></label>
    <button type="submit">创建</button>
  </form>
</section>
<section class="panel">
  {% for book in books %}
  <a class="book-row" href="/books/{{ book.id }}">
    <strong>{{ book.title }}</strong>
    <span>{{ book.status }}</span>
  </a>
  {% else %}
  <p>暂无项目。</p>
  {% endfor %}
</section>
{% endblock %}
