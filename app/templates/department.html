{% extends "base.html" %}
{% block content %}
<section class="head"><h1>{{ department }} 控制台</h1></section>
<section class="panel">
  <form class="form-grid" method="get" action="/departments/{{ department }}">
    <label>正式作品
      <select name="book_id">
        {% for item in books %}
        <option value="{{ item.id }}" {% if book and item.id == book.id %}selected{% endif %}>{{ item.title }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">切换</button>
  </form>
</section>
{% if book %}
<section class="panel">
  <h2>{{ book.title }}</h2>
  <div class="actions">
    <a class="button-link" href="/books/{{ book.id }}/outline">文风与大纲</a>
    <a class="button-link" href="/books/{{ book.id }}/chapters">生成正文</a>
    <a class="button-link" href="/books/{{ book.id }}/continuity">连续性工作室</a>
  </div>
</section>
{% endif %}
{% endblock %}
